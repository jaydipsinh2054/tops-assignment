<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form with Validation</title>
</head>
<body>

  <h1>Contact Us</h1>

  <form action="#" method="post">

    <!-- Full Name -->
    <label for="fullname">Full Name:</label><br>
    <input type="text" id="fullname" name="fullname" required minlength="3" maxlength="50" placeholder="Enter your full name"><br><br>

    <!-- Email -->
    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" required placeholder="example@example.com"><br><br>

    <!-- Phone Number -->
    <label for="phone">Phone Number:</label><br>
    <input type="tel" id="phone" name="phone" required pattern="[0-9]{10}" placeholder="1234567890"><br>
    <small>Format: 10 digits only</small><br><br>

    <!-- Subject Dropdown -->
    <label for="subject">Subject:</label><br>
    <select id="subject" name="subject" required>
      <option value="">--Select a Subject--</option>
      <option value="inquiry">General Inquiry</option>
      <option value="support">Support</option>
      <option value="feedback">Feedback</option>
    </select><br><br>

    <!-- Message -->
    <label for="message">Message:</label><br>
    <textarea id="message" name="message" rows="5" cols="40" required minlength="10" maxlength="500" placeholder="Write your message here..."></textarea><br><br>

    <!-- Submit Button -->
    <button type="submit">Submit</button>

  </form>

</body>
</html>
