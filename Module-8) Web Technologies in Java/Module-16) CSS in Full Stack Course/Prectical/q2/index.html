<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Profile Picture" class="profile-img">

        <h2 class="user-name">John Doe</h2>

        <p class="bio">
            Web developer passionate about creating clean and responsive websites.
        </p>

        <button class="follow-btn">Follow</button>
    </div>

</body>
</html>
