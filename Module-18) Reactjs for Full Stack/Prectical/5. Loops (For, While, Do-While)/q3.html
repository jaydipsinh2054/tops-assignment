<!DOCTYPE html>
<html>
<head>
    <title>Do-While Example</title>
</head>
<body>

    <h2>Enter a Number Greater Than 10</h2>

    <script>
        let number;

        // do-while loop
        do {
            number = parseInt(prompt("Enter a number greater than 10:"));
        } while (number <= 10);

        document.write("You entered: " + number + "<br>");
        document.write("This number is greater than 10.");
    </script>

</body>
</html>
