<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <title>JavaScript Data Types with Types</title>
</head>
<body>

    <h2>Check Console for Output</h2>

    <script>
        // Declare variables
        let name = "John";        // String
        let age = 25;             // Number
        let isStudent = true;     // Boolean
        let address = null;       // Null
        let phoneNumber;          // Undefined

        // Log values and their types
        console.log("Value:", name, "| Type:", typeof name);
        console.log("Value:", age, "| Type:", typeof age);
        console.log("Value:", isStudent, "| Type:", typeof isStudent);
        console.log("Value:", address, "| Type:", typeof address);
        console.log("Value:", phoneNumber, "| Type:", typeof phoneNumber);
    </script>

</body>
</html>
</body>
</html>
