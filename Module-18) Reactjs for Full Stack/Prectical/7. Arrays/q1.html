<!DOCTYPE html>
<html>
<head>
    <title>Array Operations</title>
</head>
<body>

    <h2>Array Operations Example</h2>

    <script>
        // Declare array
        let fruits = ["apple", "banana", "cherry"];

        // Add a fruit to the end
        fruits.push("orange");

        // Remove the first fruit
        fruits.shift();

        // Log modified array to console
        console.log("Modified Array:", fruits);
    </script>

</body>
</html>
