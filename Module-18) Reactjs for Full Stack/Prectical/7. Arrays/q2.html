<!DOCTYPE html>
<html>
<head>
    <title>Sum of Array Elements</title>
</head>
<body>

    <h2>Sum of All Elements in an Array</h2>

    <script>
        // Declare an array of numbers
        let numbers = [10, 20, 30, 40, 50];

        let sum = 0;

        // Loop through the array
        for (let i = 0; i < numbers.length; i++) {
            sum += numbers[i];
        }

        // Display results
        document.write("Array Elements: " + numbers + "<br>");
        document.write("Sum of all elements: " + sum);
    </script>

</body>
</html>
