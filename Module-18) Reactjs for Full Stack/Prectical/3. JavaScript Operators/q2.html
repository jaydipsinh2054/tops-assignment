<!DOCTYPE html>
<html>
<head>
    <title>Comparison Operators Example</title>
</head>
<body>

    <h2>Comparison Operators Example</h2>

    <script>
        // Declare two numbers
        let num1 = 15;
        let num2 = 10;

        // Comparison operations
        let isEqual = (num1 === num2);
        let isGreater = (num1 > num2);

        // Display results on webpage
        document.write("Number 1: " + num1 + "<br>");
        document.write("Number 2: " + num2 + "<br><br>");
        document.write("Are the numbers equal? " + isEqual + "<br>");
        document.write("Is Number 1 greater than Number 2? " + isGreater);
    </script>

</body>
</html>
