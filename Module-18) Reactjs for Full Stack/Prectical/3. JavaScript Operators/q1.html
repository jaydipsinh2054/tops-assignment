<!DOCTYPE html>
<html>
<head>
    <title>Arithmetic Operations in JavaScript</title>
</head>
<body>

    <h2>Arithmetic Operations Example</h2>

    <script>
        // Declare two numbers
        let num1 = 20;
        let num2 = 5;

        // Perform arithmetic operations
        let addition = num1 + num2;
        let subtraction = num1 - num2;
        let multiplication = num1 * num2;
        let division = num1 / num2;

        // Display results on the webpage
        document.write("Number 1: " + num1 + "<br>");
        document.write("Number 2: " + num2 + "<br><br>");
        document.write("Addition: " + addition + "<br>");
        document.write("Subtraction: " + subtraction + "<br>");
        document.write("Multiplication: " + multiplication + "<br>");
        document.write("Division: " + division + "<br>");
    </script>

</body>
</html>
