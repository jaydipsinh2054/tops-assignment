<!DOCTYPE html>
<html>
<head>
    <title>Calculate Sum Function</title>
</head>
<body>

    <h2>Calculate Sum of Two Numbers</h2>

    <script>
        // Function definition
        function calculateSum(num1, num2) {
            return num1 + num2;   // Return the sum
        }

        // Taking user input
        let number1 = parseFloat(prompt("Enter first number:"));
        let number2 = parseFloat(prompt("Enter second number:"));

        // Calling the function and storing result
        let result = calculateSum(number1, number2);

        // Display result on webpage
        document.write("First Number: " + number1 + "<br>");
        document.write("Second Number: " + number2 + "<br>");
        document.write("Sum: " + result);
    </script>

</body>
</html>
