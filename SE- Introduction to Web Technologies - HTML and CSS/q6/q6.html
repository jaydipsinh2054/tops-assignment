<!DOCTYPE html>
<html>
<head>
    <title>European Roulette</title>
</head>
<body bgcolor="green">

<h2 align="center" style="color:white;">European Roulette</h2>

<table border="1" cellspacing="2" cellpadding="10" align="center">

    <!-- Number Grid -->
    <tr>
        <td rowspan="3" bgcolor="green" style="color:white;">0</td>
        <td bgcolor="red">3</td>
        <td bgcolor="black" style="color:white;">6</td>
        <td bgcolor="red">9</td>
        <td bgcolor="red">12</td>
        <td bgcolor="black" style="color:white;">15</td>
        <td bgcolor="red">18</td>
        <td bgcolor="red">21</td>
        <td bgcolor="black" style="color:white;">24</td>
        <td bgcolor="red">27</td>
        <td bgcolor="red">30</td>
        <td bgcolor="black" style="color:white;">33</td>
        <td bgcolor="red">36</td>
        <td>2 to 1</td>
    </tr>

    <tr>
        <td bgcolor="black" style="color:white;">2</td>
        <td bgcolor="red">5</td>
        <td bgcolor="black" style="color:white;">8</td>
        <td bgcolor="black" style="color:white;">11</td>
        <td bgcolor="red">14</td>
        <td bgcolor="black" style="color:white;">17</td>
        <td bgcolor="black" style="color:white;">20</td>
        <td bgcolor="red">23</td>
        <td bgcolor="black" style="color:white;">26</td>
        <td bgcolor="black" style="color:white;">29</td>
        <td bgcolor="red">32</td>
        <td bgcolor="black" style="color:white;">35</td>
        <td>2 to 1</td>
    </tr>

    <tr>
        <td bgcolor="red">1</td>
        <td bgcolor="black" style="color:white;">4</td>
        <td bgcolor="red">7</td>
        <td bgcolor="black" style="color:white;">10</td>
        <td bgcolor="black" style="color:white;">13</td>
        <td bgcolor="red">16</td>
        <td bgcolor="red">19</td>
        <td bgcolor="black" style="color:white;">22</td>
        <td bgcolor="red">25</td>
        <td bgcolor="black" style="color:white;">28</td>
        <td bgcolor="black" style="color:white;">31</td>
        <td bgcolor="red">34</td>
        <td>2 to 1</td>
    </tr>

    <!-- Dozens Row -->
    <tr>
        <td colspan="4">1st 12</td>
        <td colspan="4">2nd 12</td>
        <td colspan="4">3rd 12</td>
    </tr>

    <!-- Bottom Options -->
    <tr>
        <td colspan="2">1 to 18</td>
        <td colspan="2">EVEN</td>
        <td colspan="2" bgcolor="red"></td>
        <td colspan="2" bgcolor="black"></td>
        <td colspan="2">ODD</td>
        <td colspan="2">19 to 36</td>
    </tr>

</table>

</body>
</html>
