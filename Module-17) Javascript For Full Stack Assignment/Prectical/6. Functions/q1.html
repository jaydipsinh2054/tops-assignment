<!DOCTYPE html>
<html>
<head>
    <title>Greet User Function</title>
</head>
<body>

    <h2>Greeting Example</h2>

    <script>
        // Function definition
        function greetUser(name) {
            document.write("Hello, " + name + "!");
        }

        // Taking user input
        let userName = prompt("Enter your name:");

        // Calling the function
        greetUser(userName);
    </script>

</body>
</html>
