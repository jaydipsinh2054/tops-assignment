<!DOCTYPE html>
<html>
<head>
    <title>Logical Operators Example</title>
</head>
<body>

    <h2>Logical Operators Example</h2>

    <script>
        // Declare variables
        let a = 15;
        let b = 3;

        // Check both conditions
        let result = (a > 10 && b < 5);

        // Print output on the webpage
        document.write("Value of a: " + a + "<br>");
        document.write("Value of b: " + b + "<br>");
        document.write("Is a > 10 AND b < 5? " + result);
    </script>

</body>
</html>
