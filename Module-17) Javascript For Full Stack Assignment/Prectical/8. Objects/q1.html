<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Object Example</title>
</head>
<body>

    <h2>Car Object Example</h2>

    <script>
        // Create car object
        let car = {
            brand: "Toyota",
            model: "Corolla",
            year: 2020
        };

        // Access and print brand and model
        document.write("Brand: " + car.brand + "<br>");
        document.write("Model: " + car.model + "<br>");

        // Update year property
        car.year = 2023;

        // Add new property color
        car.color = "Red";

        // Print updated object details
        document.write("Updated Year: " + car.year + "<br>");
        document.write("Color: " + car.color);
    </script>

</body>
</html>
