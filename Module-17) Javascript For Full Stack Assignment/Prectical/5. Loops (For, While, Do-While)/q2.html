<!DOCTYPE html>
<html>
<head>
    <title>Sum of Even Numbers</title>
</head>
<body>

    <h2>Sum of Even Numbers Between 1 and 20</h2>

    <script>
        let i = 1;
        let sum = 0;

        // Using while loop
        while (i <= 20) {
            if (i % 2 === 0) {
                sum += i;
            }
            i++;
        }

        document.write("The sum of even numbers between 1 and 20 is: " + sum);
    </script>

</body>
</html>
