<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Data Types Example</title>
</head>
<body>

    <h2>JavaScript Data Types Example</h2>

    <script>
        // String
        let name = "John";

        // Number
        let age = 25;

        // Boolean
        let isStudent = true;

        // Null
        let address = null;

        // Undefined
        let phoneNumber;

        // Display values in console
        console.log("String:", name);
        console.log("Number:", age);
        console.log("Boolean:", isStudent);
        console.log("Null:", address);
        console.log("Undefined:", phoneNumber);
    </script>

</body>
</html>
