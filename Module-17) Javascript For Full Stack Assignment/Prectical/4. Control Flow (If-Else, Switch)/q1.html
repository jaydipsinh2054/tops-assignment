<!DOCTYPE html>
<html>
<head>
    <title>Check Positive, Negative or Zero</title>
</head>
<body>

    <h2>Check if a Number is Positive, Negative, or Zero</h2>

    <script>
        // Declare a number
        let number = -5;

        // Check condition using if-else
        if (number > 0) {
            document.write("The number " + number + " is Positive.");
        } 
        else if (number < 0) {
            document.write("The number " + number + " is Negative.");
        } 
        else {
            document.write("The number is Zero.");
        }
    </script>

</body>
</html>
